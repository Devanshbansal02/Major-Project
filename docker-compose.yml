services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - bloom-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - EMBEDDING_MODEL=nomic-embed-text

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  bloom-data:
